<div class="candidate-container">
  <div class="candidate-header">
    <h1>📋 Candidate Portal</h1>
    <p>Upload and analyze your CV</p>
  </div>

  <div class="upload-section">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" placeholder="Enter your full name" class="form-input">
    </div>

    <div class="form-group">
      <label>CV Document</label>
      <div class="file-upload">
        <input type="file" id="cv-file" class="file-input">
        <label for="cv-file" class="file-label">📁 Click to upload CV</label>
      </div>
    </div>

    <div class="form-group">
      <label>Skills</label>
      <input type="text" placeholder="e.g., Java, Python, Spring Boot..." class="form-input">
    </div>

    <button (click)="analyze()" class="btn-analyze">🚀 Analyze CV</button>
  </div>

  <div *ngIf="result" class="result-section">
    <h2>📊 AI Analysis Result</h2>
    <div class="result-card">
      <div class="result-item">
        <h3>Detected Skills</h3>
        <p class="result-value">{{ result.skills }}</p>
      </div>
      <div class="result-item">
        <h3>Match Score</h3>
        <p class="result-value score">{{ result.score }}%</p>
      </div>
    </div>
  </div>
</div>
