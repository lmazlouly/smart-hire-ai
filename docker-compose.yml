services:
  db:
    image: pgvector/pgvector:pg16
    container_name: smart-hire-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_hire_ai}
      POSTGRES_USER: ${POSTGRES_USER:-smart_hire_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_hire_ai_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_hire_ai} -d ${POSTGRES_DB:-smart_hire_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
    container_name: smart-hire-ai-service
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_DIMENSIONS: ${OPENAI_EMBEDDING_DIMENSIONS:-384}
    expose:
      - "8000"
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"

  backend:
    build:
      context: ./backend
    container_name: smart-hire-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-smart_hire_ai}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-smart_hire_ai}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-smart_hire_ai_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      SECURITY_JWT_SECRET: ${SECURITY_JWT_SECRET:-change-me-to-a-long-random-secret}
      SECURITY_JWT_EXPIRATION_MS: ${SECURITY_JWT_EXPIRATION_MS:-86400000}
      AI_SERVICE_BASE_URL: http://ai-service:8000
      CLOUDFLARE_R2_ACCESS_KEY: ${CLOUDFLARE_R2_ACCESS_KEY:-}
      CLOUDFLARE_R2_SECRET_KEY: ${CLOUDFLARE_R2_SECRET_KEY:-}
      CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-http://localhost:9000}
      CLOUDFLARE_R2_BUCKET_NAME: ${CLOUDFLARE_R2_BUCKET_NAME:-smart-hire-ai}
      CLOUDFLARE_R2_PUBLIC_URL: ${CLOUDFLARE_R2_PUBLIC_URL:-http://localhost:9000/smart-hire-ai}
    expose:
      - "8080"
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend-angular
    container_name: smart-hire-frontend
    restart: unless-stopped
    depends_on:
      - backend
      - ai-service
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres-data:
